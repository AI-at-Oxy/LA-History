<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LA History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg class="auth-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
          <circle cx="16" cy="16" r="9.5" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
          <path d="M16 2 L16 30 M2 16 L30 16" stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
          <path d="M16 2 L18.2 13 L16 16 L13.8 13 Z" fill="currentColor" opacity="0.95"/>
          <path d="M16 30 L18.2 19 L16 16 L13.8 19 Z" fill="currentColor" opacity="0.4"/>
          <path d="M2 16 L13 13.8 L16 16 L13 18.2 Z" fill="currentColor" opacity="0.4"/>
          <path d="M30 16 L19 13.8 L16 16 L19 18.2 Z" fill="currentColor" opacity="0.4"/>
          <circle cx="16" cy="16" r="2.2" fill="currentColor"/>
        </svg>
        LA History
      </div>
      <span class="auth-logo-sep"></span>
      <div class="auth-tagline">Choose a New Password</div>
    </div>
    <div class="auth-body">
      <h2>Set a new password</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="auth-flash {% if category == 'success' %}success{% elif category == 'info' %}info{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.reset_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
          <label for="new_password">
            New Password
            <span style="color:#bbb; font-weight:400">(min. 8 chars, uppercase, lowercase, digit)</span>
          </label>
          <input type="password" id="new_password" name="new_password"
                 placeholder="••••••••" minlength="8" required
                 aria-describedby="pw-hint">
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="••••••••" minlength="8" required>
          <div id="pw-match-hint" style="font-size:0.78rem; margin-top:5px; display:none;"></div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit btn-lg">Reset Password</button>
      </form>

      <div class="auth-divider">
        <a href="{{ url_for('auth.login') }}">Back to sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    var pw = document.getElementById('new_password');
    var confirm = document.getElementById('confirm_password');
    var hint = document.getElementById('pw-match-hint');

    function checkMatch() {
      if (!confirm.value) { hint.style.display = 'none'; return; }
      if (pw.value === confirm.value) {
        hint.textContent = 'Passwords match.';
        hint.style.color = 'var(--success, #2e7d32)';
      } else {
        hint.textContent = 'Passwords do not match.';
        hint.style.color = 'var(--danger, #c0392b)';
      }
      hint.style.display = 'block';
    }

    pw.addEventListener('input', checkMatch);
    confirm.addEventListener('input', checkMatch);
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LA History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg class="auth-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
          <circle cx="16" cy="16" r="9.5" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
          <path d="M16 2 L16 30 M2 16 L30 16" stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
          <path d="M16 2 L18.2 13 L16 16 L13.8 13 Z" fill="currentColor" opacity="0.95"/>
          <path d="M16 30 L18.2 19 L16 16 L13.8 19 Z" fill="currentColor" opacity="0.4"/>
          <path d="M2 16 L13 13.8 L16 16 L13 18.2 Z" fill="currentColor" opacity="0.4"/>
          <path d="M30 16 L19 13.8 L16 16 L19 18.2 Z" fill="currentColor" opacity="0.4"/>
          <circle cx="16" cy="16" r="2.2" fill="currentColor"/>
        </svg>
        LA History
      </div>
      <span class="auth-logo-sep"></span>
      <div class="auth-tagline">Explore Los Angeles Through the Ages</div>
    </div>
    <div class="auth-body">
      <h2>Sign in to your account</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="auth-flash {% if category == 'success' %}success{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. explorer_1"
                 pattern="[a-zA-Z0-9_]{3,20}"
                 value="{{ request.form.get('username', '') }}" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Keep me signed in</label>
        </div>

        <button type="submit" class="btn btn-primary auth-submit btn-lg">Sign In</button>
      </form>

      <div class="auth-divider">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LA History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🗺 LA History</div>
      <div class="auth-tagline">Explore Los Angeles through the ages</div>
    </div>
    <div class="auth-body">
      <h2>Sign in to your account</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="auth-flash {% if category == 'success' %}success{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
                 value="{{ request.form.get('email', '') }}" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Keep me signed in</label>
        </div>

        <button type="submit" class="btn btn-primary auth-submit btn-lg">Sign In</button>
      </form>

      <div class="auth-divider">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
